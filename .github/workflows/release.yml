name: Release

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: build linux/${{ matrix.goarch }}
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          version="${GITHUB_REF_NAME#v}"
          out="weft-doctor-linux-${{ matrix.goarch }}"
          go build -trimpath -ldflags "\
            -X github.com/openweft/weft-doctor/cmd/weft-doctor.version=$version \
            -X github.com/openweft/weft-doctor/cmd/weft-doctor.commit=${GITHUB_SHA::7} \
            -X github.com/openweft/weft-doctor/cmd/weft-doctor.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o "$out" ./cmd/weft-doctor
      - uses: actions/upload-artifact@v4
        with:
          name: weft-doctor-linux-${{ matrix.goarch }}
          path: weft-doctor-linux-${{ matrix.goarch }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: weft-doctor-*
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/weft-doctor-*
          generate_release_notes: true
